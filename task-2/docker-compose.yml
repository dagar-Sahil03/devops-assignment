services:
  backend:
    image: sahildagar/mern-backend:latest
    ports:
      - "3000:3000"
    depends_on:
      - mongo

  frontend:
    image: sahildagar/mern-frontend:latest
    ports:
      - "3001:80"

  lamp:
    image: sahildagar/lamp-app:latest
    ports:
      - "3002:80"
    depends_on:
      - mysql
    restart: always
  mongo:
    image: mongo
    ports:
      - "27017:27017"

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: testdb
    ports:
      - "3306:3306"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../task-1/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - lamp
