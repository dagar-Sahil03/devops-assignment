name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: |
          docker build -t sahildagar/mern-backend:latest ./task-1/mern/backend
          docker push sahildagar/mern-backend:latest

      - name: Build frontend image
        run: |
          docker build -t sahildagar/mern-frontend:latest ./task-1/mern/frontend
          docker push sahildagar/mern-frontend:latest

      - name: Build lamp image
        run: |
          docker build -t sahildagar/lamp-app:latest ./task-1/lamp/php-app
          docker push sahildagar/lamp-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/html/syook-devops-assignment/task-2
            docker compose down
            docker compose pull
            docker compose up -d
