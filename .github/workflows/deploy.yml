name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: |
          docker build -t sahildagar/mern-backend:latest ./task-1/mern/backend
          docker push sahildagar/mern-backend:latest

      - name: Build frontend image
        run: |
          docker build -t sahildagar/mern-frontend:latest ./task-1/mern/frontend
          docker push sahildagar/mern-frontend:latest

      - name: Build lamp image
        run: |
          docker build -t sahildagar/lamp-app:latest ./task-1/lamp/php-app
          docker push sahildagar/lamp-app:latest
