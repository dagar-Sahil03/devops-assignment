services:
  backend:
    build: ./mern/backend
    ports:
      - "3000:3000"

  frontend:
    build: ./mern/frontend
    ports:
      - "3001:80"

  lamp:
    build: ./lamp/php-app
    ports:
      - "3002:80"
  mongo:
    image: mongo
    ports:
      - "27017:27017"

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: testdb
    ports:
      - "3306:3306"
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - lamp
